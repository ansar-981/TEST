<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Styled Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ABE2, #5563DE);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 300px;
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        p {
            color: #666;
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 18px;
            background: #5563DE;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #3f4bcc;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome</h1>
        <p>This is a simple HTML page styled with CSS.</p>
        <a href="#" class="btn">Get Started</a>
    </div>

</body>
</html>
